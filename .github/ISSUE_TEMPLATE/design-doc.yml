name: Design doc
description: A design doc issue. An agent will pick this up and propose an implementation.
title: "design: <what>"
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to solve? Why now?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed shape
      description: Rough sketch of how to solve it. Can be thin — the drafter agent will flesh it out.
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Anything the agent must respect (existing conventions, labels, tools, security).
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: How will you know this is finalized?
    validations:
      required: true
